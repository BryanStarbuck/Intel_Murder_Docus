text: |
  Remember Janet Ossebaard? The fearless Dutch researcher who dove headfirst into the deepest rabbit hole and dragged the global elite's darkest secrets into the light.

  In 2020 she dropped the bombshell documentary series "The Fall of the Cabal", a relentless exposé that later expanded into over 30 parts. Janet didn't hold back. She exposed the full spectrum of hidden control: central banks, shadow governments, media manipulation, and satanic networks at the highest levels.

  But the part that hit like thunder? PIZZAGATE. In the explosive "Children, Art & Pizza" section, she laid bare what she called a worldwide child trafficking and ritual abuse machine. Coded symbols, elite "pizza parties," disturbing "art," underground networks, and patterns linking politicians, Hollywood, royalty, and billionaires to horrific crimes, including adrenochrome and satanic rituals. She backed it with documents and survivor testimonies that woke millions up to the nightmare.

  Her calm narration made the unthinkable impossible to ignore. The series exploded across Bitchute and Rumble, fueling the Great Awakening like few others.

  Then the tragedy. In late 2023, after publicly stating she would NEVER commit suicide, Janet was found dead in Sweden. Official ruling, overdose.

  Janet risked everything to expose the monsters and fight for the children. Her work lives on.
