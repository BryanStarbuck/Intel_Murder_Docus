text: |
  Remember the two boys found on the tracks in Arkansas, 1987?

  Kevin Ives and Don Henry went out night hunting, stumbled onto a CIA cocaine drop in the woods, and never came home. Stabbed multiple times, crushed, laid across the rails, ruled an "accident" until the families forced a second autopsy. Then the files vanished and the medical examiner flipped his story. That drop was part of the Mena operation. Tons of cocaine flown in on Agency planes, guns flown out to the Contras, all under the protection of Governor Bill Clinton while George Bush ran the show from D.C. The pilot, Barry Seal, got caught red-handed. Instead of prison, he got a get-out-of-jail-free card from the Clintons. When he finally agreed to testify, they put six bullets in him in Baton Rouge. In his trunk: Bush Sr.'s private phone number.

  This is the same CIA that still runs black sites, color revolutions, and drug pipelines in 2025. This should not be happening in any way.
